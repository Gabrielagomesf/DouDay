name: duoday
description: App para casais gerenciarem relacionamento, tarefas e finanças
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  go_router: ^12.1.3
  flutter_riverpod: ^3.3.1
  flutter_screenutil: ^5.9.0
  
  # State Management
  riverpod_annotation: ^4.0.2
  
  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.9.2
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Authentication
  jwt_decoder: ^2.0.1
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_analytics: ^10.7.4
  
  # Real-time
  socket_io_client: ^2.0.3+1
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  
  # Charts & Graphs
  fl_chart: ^0.65.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1
  timezone: ^0.9.4
  
  # Image Picker
  image_picker: ^1.0.4
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Animations
  lottie: ^2.7.0
  
  # Share
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^4.0.3
  retrofit_generator: ^10.2.5
  json_serializable: ^6.7.1
  freezed: ^3.2.5
  
  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/env/.env
  
  
